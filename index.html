<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class Countdown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000;
      --fg: #fff;
      --accent: #ff2d2d;
      --dim: #444;
      --btn-bg: #111;
      --btn-border: #333;
      --btn-active: #fff;
    }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Space Mono', monospace;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--btn-border);
      position: relative;
      z-index: 10;
    }
    .block-tabs {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
    }
    .block-tab {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      padding: 0.3rem 0.55rem;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: var(--dim);
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .block-tab:hover { border-color: #666; color: #999; }
    .block-tab.active {
      border-color: var(--btn-active);
      color: var(--btn-active);
      background: #1a1a1a;
    }
    .block-tab.done-tab {
      border-color: var(--accent) !important;
      color: var(--accent) !important;
    }

    /* ── THREE DOTS MENU ── */
    .menu-wrap { position: relative; flex-shrink: 0; }
    .dots-btn {
      background: none;
      border: 1px solid var(--btn-border);
      color: var(--dim);
      cursor: pointer;
      padding: 0.3rem 0.6rem;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      transition: color 0.15s;
      line-height: 1;
    }
    .dots-btn:hover { color: #fff; border-color: #666; }

    /* Dropdown: anchored to viewport on mobile so it never clips */
    .dropdown {
      display: none;
      position: fixed;
      top: 50px;
      right: 0.75rem;
      background: #111;
      border: 1px solid #333;
      padding: 0.75rem;
      width: min(260px, calc(100vw - 1.5rem));
      z-index: 300;
      flex-direction: column;
      gap: 0.5rem;
    }
    .dropdown.open { display: flex; }
    .dropdown label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--dim);
      text-transform: uppercase;
    }
    .dropdown input[type="text"] {
      background: #000;
      border: 1px solid #333;
      color: #fff;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      padding: 0.4rem 0.5rem;
      width: 100%;
      outline: none;
    }
    .dropdown input[type="text"]:focus { border-color: #888; }
    .dropdown-row { display: flex; flex-direction: column; gap: 0.3rem; }
    .save-btn {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      font-weight: 700;
      text-transform: uppercase;
      background: #fff;
      color: #000;
      border: none;
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .save-btn:hover { background: #ddd; }

    /* ── MAIN DISPLAY ── */
    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100vh - 49px);
      padding: 0 1rem 1rem;
      text-align: center;
      gap: 0;
    }

    .block-badge {
      font-size: clamp(0.6rem, 1.8vw, 0.75rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #555;
      border: 1px solid #1e1e1e;
      padding: 0.2rem 0.6rem;
      margin-bottom: clamp(0.2rem, 1vh, 0.6rem);
    }

    .label-top {
      font-size: clamp(0.55rem, 1.8vw, 0.8rem);
      letter-spacing: 0.4em;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: clamp(0rem, 0.5vh, 0.4rem);
    }

    .number {
      font-family: 'Bebas Neue', sans-serif;
      /* Fill ~60% of viewport height */
      font-size: clamp(10rem, 55vh, 55vw);
      line-height: 0.88;
      color: var(--fg);
      display: block;
    }
    .number.has-count {
      text-shadow: 4px 4px 0 var(--accent), 9px 9px 0 rgba(255,45,45,0.2);
    }
    .number.zero {
      color: var(--accent);
      text-shadow: none;
    }

    .label-bottom {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.6rem, 7vw, 5rem);
      letter-spacing: 0.1em;
      line-height: 1.05;
      margin-top: clamp(0.1rem, 0.8vh, 0.5rem);
    }
    .label-bottom.done {
      color: var(--accent);
      font-size: clamp(1.2rem, 5vw, 3.5rem);
    }

    .next-class {
      margin-top: clamp(0.4rem, 1.5vh, 1.2rem);
      font-size: clamp(0.55rem, 1.5vw, 0.75rem);
      color: var(--dim);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .next-class span { color: #777; }

    @keyframes flash {
      0% { transform: scale(1.03); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }
    .tick { animation: flash 0.35s ease; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="block-tabs" id="tabs"></div>
  <div class="menu-wrap">
    <button class="dots-btn" id="dotsBtn" title="Settings">• • •</button>
    <div class="dropdown" id="dropdown">
      <div class="dropdown-row">
        <label>Teacher name for active block</label>
        <input type="text" id="teacherInput" placeholder="e.g. Pumphrey" />
      </div>
      <button class="save-btn" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="block-badge" id="badge">A BLOCK</div>
  <span class="number" id="num">—</span>
  <div class="label-bottom" id="lbl"></div>
  <div class="next-class" id="next"></div>
</div>

<script>
const blockTimes = {
  A: ['2026-06-04T09:19:00','2026-06-08T11:33:00','2026-06-09T10:26:00','2026-06-10T10:08:00','2026-06-12T10:26:00','2026-06-15T09:19:00'],
  B: ['2026-06-04T10:26:00','2026-06-05T09:19:00','2026-06-09T11:33:00','2026-06-10T11:04:00','2026-06-12T09:19:00','2026-06-15T10:26:00'],
  C: ['2026-06-04T11:33:00','2026-06-05T10:26:00','2026-06-08T09:19:00','2026-06-10T12:00:00','2026-06-11T09:19:00','2026-06-15T11:33:00'],
  D: ['2026-06-05T11:33:00','2026-06-08T10:26:00','2026-06-09T09:19:00','2026-06-11T10:26:00','2026-06-12T11:33:00'],
  E: ['2026-06-04T13:08:00','2026-06-08T14:46:00','2026-06-09T13:08:00','2026-06-11T11:33:00','2026-06-12T14:46:00','2026-06-15T13:08:00'],
  F: ['2026-06-04T14:46:00','2026-06-05T13:08:00','2026-06-09T14:46:00','2026-06-10T14:46:00','2026-06-11T13:08:00','2026-06-15T14:46:00'],
  G: ['2026-06-05T14:46:00','2026-06-08T13:08:00','2026-06-10T13:50:00','2026-06-11T14:46:00','2026-06-12T13:08:00'],
};
const BLOCKS = ['A','B','C','D','E','F','G'];

let activeBlock = localStorage.getItem('activeBlock') || 'A';
let teachers = JSON.parse(localStorage.getItem('teachers') || '{}');
// No default teacher — blank slate

function getCount(block) {
  const now = new Date();
  return blockTimes[block].filter(t => new Date(t) > now).length;
}
function getNext(block) {
  const now = new Date();
  return blockTimes[block].map(t => new Date(t)).find(d => d > now) || null;
}
function formatDate(d) {
  return d.toLocaleString('en-US', { weekday:'short', month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
}
function possessive(name) {
  if (!name) return null;
  const t = name.trim();
  if (!t) return null;
  return t.match(/s$/i) ? t + "'" : t + 's';
}

const numEl   = document.getElementById('num');
const lblEl   = document.getElementById('lbl');
const nextEl  = document.getElementById('next');
const badgeEl = document.getElementById('badge');
const tabsEl  = document.getElementById('tabs');
let lastCounts = {};

function renderTabs() {
  tabsEl.innerHTML = '';
  BLOCKS.forEach(b => {
    const btn = document.createElement('button');
    const isDone = getCount(b) === 0;
    btn.className = 'block-tab' + (b === activeBlock ? ' active' : '') + (isDone ? ' done-tab' : '');
    btn.textContent = b + ' BLOCK';
    btn.onclick = () => {
      activeBlock = b;
      localStorage.setItem('activeBlock', b);
      renderTabs();
      renderMain();
    };
    tabsEl.appendChild(btn);
  });
}

function renderMain() {
  const b = activeBlock;
  const count = getCount(b);
  const name = possessive(teachers[b]);
  badgeEl.textContent = b + ' BLOCK';

  if (count !== lastCounts[b]) {
    numEl.classList.add('tick');
    setTimeout(() => numEl.classList.remove('tick'), 350);
    lastCounts[b] = count;
  }

  numEl.textContent = count;

  if (count === 0) {
    numEl.className = 'number zero';
    lblEl.className = 'label-bottom done';
    lblEl.textContent = name
      ? 'NO MORE ' + name.toUpperCase().replace(/'/g,'') + '!'
      : 'NO MORE ' + b + ' BLOCK!';
    nextEl.textContent = '';
  } else {
    numEl.className = 'number has-count';
    lblEl.className = 'label-bottom';
    lblEl.textContent = name
      ? name.toUpperCase() + ' LEFT'
      : b + ' BLOCK' + (count === 1 ? '' : 'S') + ' LEFT';
    const nxt = getNext(b);
    if (nxt) nextEl.innerHTML = `next: <span>${formatDate(nxt)}</span>`;
  }
}

// Dropdown
const dotsBtn  = document.getElementById('dotsBtn');
const dropdown = document.getElementById('dropdown');
const input    = document.getElementById('teacherInput');
const saveBtn  = document.getElementById('saveBtn');

dotsBtn.addEventListener('click', e => {
  e.stopPropagation();
  dropdown.classList.toggle('open');
  if (dropdown.classList.contains('open')) {
    input.value = teachers[activeBlock] || '';
    input.focus();
  }
});
document.addEventListener('click', e => {
  if (!dropdown.contains(e.target) && e.target !== dotsBtn)
    dropdown.classList.remove('open');
});
saveBtn.addEventListener('click', () => {
  teachers[activeBlock] = input.value.trim();
  localStorage.setItem('teachers', JSON.stringify(teachers));
  dropdown.classList.remove('open');
  renderMain();
  renderTabs();
});
input.addEventListener('keydown', e => { if (e.key === 'Enter') saveBtn.click(); });

renderTabs();
renderMain();
setInterval(() => { renderMain(); renderTabs(); }, 10000);
</script>
</body>
</html>
